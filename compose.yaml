services:
  mariadb:
    build: mariadb/
    networks:
      - wp_net
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - .env
    secrets:
      - db_password

  wordpress:
    build: wordpress/
    depends_on:
      - mariadb
    networks:
      - wp_net
    volumes:
      - wp_data:/var/www/html
    env_file:
      - .env
    secrets:
      - db_password

  nginx:
    build: nginx/
    depends_on:
      - wordpress
    networks:
      - wp_net
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html

volumes:
  db_data:
  wp_data:

secrets:
  db_password:
    file: ./.secrets/db_password.txt

networks:
  wp_net:
    driver: bridge
